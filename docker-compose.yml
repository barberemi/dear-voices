services:
  # ─────────────────────────────────────────
  # BACKEND  –  FastAPI + XTTS v2
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dearvoices_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app                                             # Hot-reload en dev (--reload actif)
      - ./backend/uploads:/app/uploads                            # Voix uploadées (visible localement)
      - ./backend/outputs:/app/outputs                            # Audios générés (visible localement)
      - /home/rbarbe/.local/share/tts:/root/.local/share/tts:ro                          # Coqui TTS models (~2GB)
      - /home/rbarbe/.cache/huggingface:/root/.cache/huggingface:ro                      # Hugging Face models
      - /home/rbarbe/.cache/torch:/root/.cache/torch:ro                                  # PyTorch hub models
      # Attention : vérifie que le dossier pip-packages correspond bien à la version python du Dockerfile (3.10)
      - /home/rbarbe/.local/share/dearvoices/pip-packages:/usr/local/lib/python3.10/dist-packages:ro  # Packages pip (~7GB, évite le réinstall)
    environment:
      - PYTHONUNBUFFERED=1
    # Décommente les lignes suivantes si tu as un GPU NVIDIA
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - dearvoices_net

  # ────────────────────────────────────────────────
  # FRONTEND  –  React (Vite en Dev / Nginx en Prod)
  # ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev # On utilise l'étape de dev pour le hot-reload
    container_name: dearvoices_frontend
    restart: unless-stopped
    ports:
      - "3000:3000" # Vite écoute sur 3000 (défini dans vite.config.js)
    volumes:
      - ./frontend:/app # Permet le hot-reload depuis ton éditeur
      - /app/node_modules # Évite que ton node_modules local n'écrase celui du conteneur
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - dearvoices_net

# ─────────────────────────────────────────
# RÉSEAU interne
# ─────────────────────────────────────────
networks:
  dearvoices_net:
    driver: bridge
